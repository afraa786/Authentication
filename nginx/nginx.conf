limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=20r/m;

server {
    listen 80;
    server_name YOUR_OCI_PUBLIC_IP;   # replace with your OCI IP or domain

    location /api/ {
        limit_req zone=auth_limit burst=10 nodelay;

        proxy_pass         https://authentication-vi22.onrender.com;
        proxy_http_version 1.1;
        proxy_ssl_server_name on;
        proxy_set_header   Host              authentication-vi22.onrender.com;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        proxy_connect_timeout 15s;
        proxy_read_timeout    30s;
    }

    location /health {
        return 200 "OK\n";
        add_header Content-Type text/plain;
    }
}

