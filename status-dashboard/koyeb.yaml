name: auth-status-dashboard
services:
  - name: dashboard
    type: web
    git:
      repository: github.com/YOUR_GITHUB_USERNAME/YOUR_REPO
      branch: main
      build_command: ""
      run_command: ""
    docker:
      dockerfile: status-dashboard/Dockerfile
    ports:
      - port: 3001
        protocol: http
    health_checks:
      - path: /health
        port: 3001
    env:
      - name: PORT
        value: "3001"
      - name: VERCEL_URL
        value: "https://your-app.vercel.app"
      - name: NETLIFY_URL
        value: "https://your-app.netlify.app"
      - name: OCI_HEALTH_URL
        value: "http://YOUR_OCI_IP/health"
